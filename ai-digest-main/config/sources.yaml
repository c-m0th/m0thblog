# ============================================================
# config/sources.yaml — 订阅源配置
# 方向：心脑医学信号处理 + 深度学习 + 纯临床心脑疾病 + 中文科研平台
# 复制为 sources.yaml 后按需注释/删除不需要的条目
# ============================================================

settings:
  max_items_per_source: 3          # 每个来源最多处理几条（源多时建议 2-3）
  max_content_chars: 12000         # 送入 Claude 的最大字符数
  days_lookback: 1                 # 只看最近几天的内容
  language_hint: "中文输出，简洁，准确，专业术语保留英文原文"


