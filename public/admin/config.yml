backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "notes"
    label: "学习笔记"
    label_singular: "笔记"
    folder: "src/content/notes"
    create: true
    delete: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    view_filters:
      - label: "公开"
        field: "draft"
        pattern: false
      - label: "未公开"
        field: "draft"
        pattern: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "更新日期", name: "updated", widget: "datetime", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "领域", name: "area", widget: "string", required: false }
      - label: "状态"
        name: "status"
        widget: "select"
        default: "evergreen"
        options:
          - { label: "常青", value: "evergreen" }
          - { label: "草稿整理", value: "seed" }
          - { label: "草稿", value: "draft" }
      - { label: "未公开（不在前台显示）", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "papers"
    label: "论文阅读"
    label_singular: "论文"
    folder: "src/content/papers"
    create: true
    delete: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    view_filters:
      - label: "公开"
        field: "draft"
        pattern: false
      - label: "未公开"
        field: "draft"
        pattern: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "更新日期", name: "updated", widget: "datetime", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "作者", name: "authors", widget: "list", required: false }
      - { label: "会议/期刊", name: "venue", widget: "string", required: false }
      - { label: "年份", name: "year", widget: "number", value_type: "int", required: false }
      - { label: "DOI", name: "doi", widget: "string", required: false }
      - { label: "PDF", name: "pdf", widget: "file", required: false }
      - label: "阅读状态"
        name: "readingStatus"
        widget: "select"
        default: "reading"
        options:
          - { label: "待读", value: "queued" }
          - { label: "精读中", value: "reading" }
          - { label: "已读", value: "read" }
          - { label: "可复现", value: "reproducible" }
      - { label: "未公开（不在前台显示）", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "projects"
    label: "项目复盘"
    label_singular: "项目"
    folder: "src/content/projects"
    create: true
    delete: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    view_filters:
      - label: "公开"
        field: "draft"
        pattern: false
      - label: "未公开"
        field: "draft"
        pattern: true
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "摘要", name: "description", widget: "text" }
      - { label: "封面图", name: "cover", widget: "image", required: false }
      - { label: "发布日期", name: "date", widget: "datetime" }
      - { label: "更新日期", name: "updated", widget: "datetime", required: false }
      - { label: "标签", name: "tags", widget: "list", required: false }
      - { label: "角色", name: "role", widget: "string", required: false }
      - { label: "技术栈", name: "stack", widget: "list", required: false }
      - { label: "代码仓库", name: "repo", widget: "string", required: false }
      - { label: "演示地址", name: "demo", widget: "string", required: false }
      - label: "状态"
        name: "status"
        widget: "select"
        default: "active"
        options:
          - { label: "进行中", value: "active" }
          - { label: "已完成", value: "shipped" }
          - { label: "归档", value: "archived" }
      - { label: "未公开（不在前台显示）", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown" }
