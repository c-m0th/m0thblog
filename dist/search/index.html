<!DOCTYPE html><html lang="zh-CN"> <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="generator" content="Astro v6.3.2"><title>搜索 | Knowledge Blog</title><meta name="description" content="搜索所有笔记、论文和项目"><meta property="og:title" content="搜索 | Knowledge Blog"><meta property="og:description" content="搜索所有笔记、论文和项目"><meta property="og:image" content="/assets/knowledge-hero.png"><link rel="stylesheet" href="/_astro/BaseLayout.BAGfvpXr.css"></head> <body> <div class="site-shell"> <header class="site-header"> <div class="site-header__inner"> <a class="brand" href="/" aria-label="Knowledge Blog 首页"> <span class="brand__mark">K</span> <span>Knowledge Blog</span> </a> <nav class="site-nav" aria-label="主导航"> <a href="/notes/"> 笔记 </a><a href="/papers/"> 论文 </a><a href="/projects/"> 项目 </a><a href="/tags/"> 标签 </a><a href="/search/" aria-current="page"> 搜索 </a> </nav> </div> </header> <main class="page-main" data-pagefind-body>  <header class="page-heading container"> <p class="eyebrow">Search</p> <h1>搜索</h1> <p>构建后会使用 Pagefind 全文搜索；开发环境会先用本地索引搜索标题、摘要和标签。</p> </header> <section class="container search-panel"> <link rel="stylesheet" href="/pagefind/pagefind-component-ui.css"> <script type="module" src="/pagefind/pagefind-component-ui.js"></script> <div class="pagefind-component-search"> <pagefind-config base-url="/"></pagefind-config> <pagefind-input placeholder="输入关键词"></pagefind-input> <pagefind-summary></pagefind-summary> <pagefind-results max-sub-results="3"></pagefind-results> </div> <div class="search-box" data-local-search> <input type="search" placeholder="输入关键词" aria-label="搜索关键词"> <div class="search-results" aria-live="polite"></div> </div> </section> <script>
    window.addEventListener("DOMContentLoaded", async () => {
      const local = document.querySelector("[data-local-search]");
      if (customElements.get("pagefind-input")) {
        local.hidden = true;
        return;
      }

      customElements.whenDefined("pagefind-input").then(() => {
        local.hidden = true;
      });

      const input = local.querySelector("input");
      const results = local.querySelector(".search-results");
      const response = await fetch("/search-index.json");
      const rows = await response.json();

      function render(query) {
        const terms = query.trim().toLowerCase().split(/\s+/).filter(Boolean);
        const matches = terms.length
          ? rows.filter((row) => {
              const haystack = [
                row.title,
                row.description,
                row.collectionLabel,
                ...row.tags
              ].join(" ").toLowerCase();
              return terms.every((term) => haystack.includes(term));
            })
          : rows.slice(0, 8);

        results.innerHTML = matches
          .slice(0, 12)
          .map((row) => `
            <article class="search-result">
              <a href="${row.url}">${row.title}</a>
              <p>${row.collectionLabel} · ${row.description}</p>
            </article>
          `)
          .join("");
      }

      input.addEventListener("input", () => render(input.value));
      render("");
    });
  </script>  </main> <footer class="site-footer"> <div class="site-footer__inner container"> <span>Knowledge Blog</span> <span>Notes, papers, projects, and the trail between them.</span> </div> </footer> </div> </body></html>
