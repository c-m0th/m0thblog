name: Daily AI Digest

on:
  schedule:
    # 08:00 Asia/Shanghai == 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        working-directory: ai-digest-main
        run: |
          python -m pip install --upgrade pip
          pip install anthropic feedparser youtube-transcript-api trafilatura \
            requests PyYAML schedule jinja2 beautifulsoup4 python-dotenv yt-dlp

      - name: Restore digest database
        uses: actions/cache@v4
        with:
          path: ai-digest-main/data/digest.db
          key: digest-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            digest-db-${{ runner.os }}-

      - name: Run digest
        working-directory: ai-digest-main
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_SEND_INDIVIDUALLY: ${{ secrets.EMAIL_SEND_INDIVIDUALLY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          BLOG_ROOT: ..
          BLOG_PUBLISH_ENABLED: "true"
          BLOG_DAILY_DIGEST_TAG: "每日摘要"
          BLOG_ADMIN_URL: "http://127.0.0.1:4321/admin/#/collections/papers/new"
        run: python main.py --run-now

      - name: Commit generated paper entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/papers/daily-digest-*.mdx
          if git diff --cached --quiet; then
            echo "No generated paper entry changes to commit."
          else
            git commit -m "chore: add daily digest $(date -u +'%Y-%m-%d')"
            git push
          fi
